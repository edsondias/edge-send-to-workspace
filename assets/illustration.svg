<svg width="1000" height="420" viewBox="0 0 1000 420" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, 'Segoe UI', sans-serif" role="img" aria-label="Abas de um dominio sendo movidas para a janela de um Workspace do Edge">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#2563eb" flood-opacity="0.30"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1000" height="420" rx="22" fill="url(#bg)"/>

  <!-- Titulo -->
  <text x="500" y="52" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Enviar abas do site &#8594; janela do Workspace</text>
  <text x="500" y="78" text-anchor="middle" font-size="13" fill="#64748b">Move de uma vez todas as abas de um dominio &#183; Edge &#183; Manifest V3</text>

  <!-- ===================== Janela de origem ===================== -->
  <g filter="url(#shadow)">
    <rect x="60" y="120" width="360" height="230" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  </g>
  <!-- barra de titulo -->
  <rect x="60" y="120" width="360" height="34" rx="12" fill="#f1f5f9"/>
  <rect x="60" y="142" width="360" height="12" fill="#f1f5f9"/>
  <circle cx="82" cy="137" r="5" fill="#e2e8f0"/>
  <circle cx="100" cy="137" r="5" fill="#e2e8f0"/>
  <circle cx="118" cy="137" r="5" fill="#e2e8f0"/>
  <text x="240" y="141" text-anchor="middle" font-size="11" fill="#94a3b8">Janela comum &#183; abas misturadas</text>

  <!-- abas (origem): exemplo.com em azul, outras em cinza -->
  <!-- aba 1 - exemplo.com -->
  <rect x="74" y="164" width="74" height="30" rx="7" fill="#dbeafe" stroke="#2563eb"/>
  <circle cx="86" cy="179" r="4" fill="#2563eb"/>
  <text x="95" y="183" font-size="10" fill="#1e3a8a">exemplo.com</text>
  <!-- aba 2 - outro -->
  <rect x="152" y="164" width="74" height="30" rx="7" fill="#f1f5f9" stroke="#e2e8f0"/>
  <circle cx="164" cy="179" r="4" fill="#cbd5e1"/>
  <rect x="173" y="175" width="42" height="8" rx="4" fill="#e2e8f0"/>
  <!-- aba 3 - exemplo.com -->
  <rect x="230" y="164" width="74" height="30" rx="7" fill="#dbeafe" stroke="#2563eb"/>
  <circle cx="242" cy="179" r="4" fill="#2563eb"/>
  <text x="251" y="183" font-size="10" fill="#1e3a8a">exemplo.com</text>
  <!-- aba 4 - outro -->
  <rect x="308" y="164" width="74" height="30" rx="7" fill="#f1f5f9" stroke="#e2e8f0"/>
  <circle cx="320" cy="179" r="4" fill="#cbd5e1"/>
  <rect x="329" y="175" width="42" height="8" rx="4" fill="#e2e8f0"/>

  <!-- segunda linha de abas -->
  <rect x="74" y="200" width="74" height="30" rx="7" fill="#f1f5f9" stroke="#e2e8f0"/>
  <circle cx="86" cy="215" r="4" fill="#cbd5e1"/>
  <rect x="95" y="211" width="42" height="8" rx="4" fill="#e2e8f0"/>
  <rect x="152" y="200" width="74" height="30" rx="7" fill="#dbeafe" stroke="#2563eb"/>
  <circle cx="164" cy="215" r="4" fill="#2563eb"/>
  <text x="173" y="219" font-size="10" fill="#1e3a8a">exemplo.com</text>

  <!-- corpo da pagina -->
  <rect x="74" y="244" width="332" height="90" rx="8" fill="#f8fafc" stroke="#eef2f7"/>
  <rect x="90" y="262" width="160" height="10" rx="5" fill="#e2e8f0"/>
  <rect x="90" y="282" width="300" height="8" rx="4" fill="#eef2f7"/>
  <rect x="90" y="298" width="300" height="8" rx="4" fill="#eef2f7"/>
  <rect x="90" y="314" width="220" height="8" rx="4" fill="#eef2f7"/>

  <!-- ===================== Seta central ===================== -->
  <g transform="translate(440,210)">
    <rect x="-2" y="-13" width="96" height="26" rx="13" fill="url(#arrow)"/>
    <path d="M 92 -22 L 124 0 L 92 22 Z" fill="#2563eb"/>
    <!-- atalho -->
    <rect x="6" y="-50" width="108" height="24" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="60" y="-34" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">Alt+Shift+M</text>
    <!-- contagem -->
    <text x="60" y="42" text-anchor="middle" font-size="12" font-weight="600" fill="#2563eb">3 abas movidas</text>
  </g>

  <!-- ===================== Janela do Workspace ===================== -->
  <g filter="url(#glow)">
    <rect x="580" y="120" width="360" height="230" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  </g>
  <!-- barra de titulo -->
  <rect x="581" y="121" width="358" height="34" rx="11" fill="#eff6ff"/>
  <rect x="581" y="143" width="358" height="12" fill="#eff6ff"/>
  <rect x="596" y="129" width="92" height="18" rx="9" fill="#2563eb"/>
  <text x="642" y="142" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">WORKSPACE</text>
  <text x="700" y="142" font-size="11" font-weight="600" fill="#1e3a8a">Trabalho</text>

  <!-- grupo agrupado de exemplo.com -->
  <rect x="592" y="162" width="248" height="38" rx="9" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="600" y="216" font-size="10" fill="#2563eb">&#9679; exemplo.com</text>

  <!-- aba fixada (pinned) preservada -->
  <rect x="600" y="168" width="30" height="26" rx="7" fill="#dbeafe" stroke="#2563eb"/>
  <path d="M 615 174 l 3 5 l 4 1 l -3 3 l 1 5 l -5 -3 l -5 3 l 1 -5 l -3 -3 l 4 -1 Z" fill="#2563eb"/>
  <!-- abas exemplo.com agrupadas -->
  <rect x="636" y="168" width="64" height="26" rx="7" fill="#dbeafe" stroke="#2563eb"/>
  <circle cx="647" cy="181" r="4" fill="#2563eb"/>
  <text x="655" y="185" font-size="9" fill="#1e3a8a">exemplo</text>
  <rect x="706" y="168" width="64" height="26" rx="7" fill="#dbeafe" stroke="#2563eb"/>
  <circle cx="717" cy="181" r="4" fill="#2563eb"/>
  <text x="725" y="185" font-size="9" fill="#1e3a8a">exemplo</text>
  <rect x="776" y="168" width="64" height="26" rx="7" fill="#dbeafe" stroke="#2563eb"/>
  <circle cx="787" cy="181" r="4" fill="#2563eb"/>
  <text x="795" y="185" font-size="9" fill="#1e3a8a">exemplo</text>

  <!-- corpo da pagina -->
  <rect x="594" y="244" width="332" height="90" rx="8" fill="#f8fafc" stroke="#eef2f7"/>
  <rect x="610" y="262" width="160" height="10" rx="5" fill="#bfdbfe"/>
  <rect x="610" y="282" width="300" height="8" rx="4" fill="#eef2f7"/>
  <rect x="610" y="298" width="300" height="8" rx="4" fill="#eef2f7"/>
  <rect x="610" y="314" width="220" height="8" rx="4" fill="#eef2f7"/>

  <!-- badge de contagem no canto (recurso badge) -->
  <circle cx="936" cy="124" r="13" fill="#2563eb" stroke="#ffffff" stroke-width="2"/>
  <text x="936" y="128" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">3</text>
</svg>
