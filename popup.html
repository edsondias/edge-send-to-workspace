<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<style>
  body { font: 13px/1.4 system-ui, "Segoe UI", sans-serif; width: 320px; margin: 0; padding: 12px; color: #111; background: #fff; }
  h1 { font-size: 13px; margin: 0 0 8px; }
  .muted { color: #666; }
  fieldset { border: 1px solid #ddd; border-radius: 8px; margin: 0 0 10px; padding: 8px; }
  legend { padding: 0 4px; color: #444; }
  label.row { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
  #customRow { display: none; }
  input[type=text] { flex: 1; padding: 4px 6px; border: 1px solid #ccc; border-radius: 6px; }
  #windows { max-height: 150px; overflow: auto; display: flex; flex-direction: column; gap: 2px; }
  label.win { display: flex; align-items: center; gap: 6px; padding: 3px; border-radius: 6px; }
  label.win:hover { background: #f3f4f6; }
  label.win span.lbl { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tag { font-size: 10px; background: #e5e7eb; border-radius: 4px; padding: 0 4px; color: #374151; }
  button { width: 100%; padding: 8px; border: 0; border-radius: 8px; background: #2563eb; color: #fff; font-weight: 600; cursor: pointer; }
  button:hover { background: #1d4ed8; }
  #status { margin-top: 8px; min-height: 16px; }
  #status.ok { color: #15803d; }
  #status.err { color: #b91c1c; }
  b { font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <h1>Enviar abas do site &rarr; janela do Workspace</h1>
  <div class="muted">Dominio da aba atual: <b id="host">&hellip;</b></div>
  <p style="margin:6px 0"><b id="count">0</b> aba(s) serao movidas.</p>

  <fieldset>
    <legend>O que mover</legend>
    <label class="row"><input type="radio" name="mode" value="host" checked /> So este host exato</label>
    <label class="row"><input type="radio" name="mode" value="subdomain" /> Host + subdominios</label>
    <label class="row"><input type="radio" name="mode" value="custom" /> Padrao custom</label>
    <label class="row" id="customRow"><input id="customPattern" type="text" placeholder="*.exemplo.com" /></label>
  </fieldset>

  <fieldset>
    <legend>Janela de destino (abra o Workspace antes)</legend>
    <div id="windows"></div>
    <label class="row" style="margin-top:6px"><input id="focusAfter" type="checkbox" checked /> Focar a janela apos mover</label>
  </fieldset>

  <button id="moveBtn">Mover abas</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
